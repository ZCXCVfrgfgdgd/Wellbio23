<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NexsyzBio — 0.1.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#00ff41;--gdim:#00c832;--gdk:#003b0e;--bg:#020c04;
  --mono:'Share Tech Mono','Courier New',Courier,monospace;
  --vt:'VT323','Courier New',Courier,monospace;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--g);font-family:var(--mono);overflow:hidden}

/* NO CUSTOM CURSOR ON MOBILE */
@media(pointer:fine){body{cursor:none}#cursor{display:block}}
#cursor{display:none;position:fixed;width:16px;height:16px;border:2px solid var(--g);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 8px var(--g)}

/* MATRIX */
#matrix{position:fixed;inset:0;z-index:0;opacity:0;transition:opacity 1.4s}
#matrix.on{opacity:1}

/* CRT */
#scanlines{position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.025) 2px,rgba(0,255,65,.025) 4px)}
#vignette{position:fixed;inset:0;pointer-events:none;z-index:101;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.85) 100%)}
#sweep{position:fixed;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,rgba(0,255,65,.15),transparent);z-index:102;pointer-events:none;animation:sweep 5s linear infinite}
@keyframes sweep{0%{top:-4px}100%{top:100vh}}

/* CORNERS */
.c{position:fixed;width:28px;height:28px;border-color:rgba(0,255,65,.3);border-style:solid;z-index:500;pointer-events:none}
.c.tl{top:10px;left:10px;border-width:2px 0 0 2px}
.c.tr{top:10px;right:10px;border-width:2px 2px 0 0}
.c.bl{bottom:10px;left:10px;border-width:0 0 2px 2px}
.c.br{bottom:10px;right:10px;border-width:0 2px 2px 0}

/* FLASHLIGHT */
#fl{position:fixed;inset:0;z-index:200;pointer-events:none;background:radial-gradient(circle 0px at 50% 50%,rgba(0,255,65,.2) 0%,rgba(0,0,0,.98) 100%);opacity:0;transition:opacity .4s}

/* ═══ ENTER SCREEN ═══ */
#enter-screen{
  position:fixed;inset:0;z-index:400;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;
  background:var(--bg);transition:opacity .6s;
}
#enter-screen.out{opacity:0;pointer-events:none}

#enter-logo{
  font-family:var(--vt);font-size:clamp(2.8rem,12vw,5.5rem);
  color:var(--g);letter-spacing:.12em;
  text-shadow:0 0 10px var(--g),0 0 35px rgba(0,255,65,.3);
  opacity:0;transform:translateY(12px);
  transition:opacity .7s,transform .7s;
}
#enter-logo.show{opacity:1;transform:none}

#enter-sub{
  font-family:var(--mono);font-size:clamp(.65rem,3vw,.8rem);
  letter-spacing:.3em;color:rgba(0,255,65,.4);
  opacity:0;transition:opacity .7s .25s;
}
#enter-sub.show{opacity:1}

#btn-enter{
  font-family:var(--mono);
  font-size:clamp(.85rem,4vw,1rem);
  letter-spacing:.25em;
  color:#020c04;
  background:var(--g);
  border:none;
  padding:.75em 2.4em;
  cursor:pointer;
  box-shadow:0 0 0 1px var(--g),0 0 20px rgba(0,255,65,.45);
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  opacity:0;
  transition:opacity .7s .5s,box-shadow .2s,transform .15s;
  -webkit-tap-highlight-color:transparent;
}
#btn-enter.show{opacity:1}
#btn-enter:active{transform:scale(.96)}

/* ═══ STAGE ═══ */
#stage{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center}

#hero{text-align:center;opacity:0;transition:opacity .5s,transform .8s cubic-bezier(.4,0,.2,1)}
#hero.show{opacity:1}

#hl{
  font-family:var(--vt);font-size:clamp(.9rem,3.5vw,1.3rem);
  color:rgba(0,255,65,.5);letter-spacing:.2em;margin-bottom:.35em;
  opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s;
}
#hero.show #hl{opacity:1;transform:none}

#tl{
  font-family:var(--vt);font-size:clamp(3rem,14vw,7rem);
  color:var(--g);letter-spacing:.1em;line-height:1;
  text-shadow:0 0 8px var(--g),0 0 28px rgba(0,255,65,.4);
  opacity:0;transform:translateY(12px);transition:opacity .6s .1s,transform .6s .1s;
}
#hero.show #tl{opacity:1;transform:none}

#sl{
  font-family:var(--mono);font-size:clamp(.75rem,3vw,1rem);
  color:rgba(0,255,65,.45);letter-spacing:.45em;margin-top:.5em;
  opacity:0;transform:translateY(6px);transition:opacity .5s .25s,transform .5s .25s;
}
#hero.show #sl{opacity:1;transform:none}

#hero.sm{transform:translateY(-36vh)}
#hero.sm #tl{font-size:clamp(1.2rem,5vw,2rem);letter-spacing:.22em;text-shadow:0 0 5px var(--g),0 0 14px rgba(0,255,65,.3)}
#hero.sm #hl,#hero.sm #sl{opacity:0;pointer-events:none}

/* ═══ SEARCH ═══ */
#sw{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,30px);
  width:min(560px,92vw);
  opacity:0;pointer-events:none;
  transition:opacity .5s .3s,transform .5s .3s;
  z-index:310;
}
#sw.show{opacity:1;pointer-events:all;transform:translate(-50%,0)}

#sbox{
  display:flex;align-items:center;
  border:1px solid rgba(0,255,65,.4);
  background:rgba(0,255,65,.04);
  padding:.6em 1em;gap:.6em;
  box-shadow:0 0 20px rgba(0,255,65,.08);
}
.si{font-size:1.2rem;color:rgba(0,255,65,.55);user-select:none}
#sinput{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--g);font-family:var(--mono);
  font-size:clamp(.85rem,4vw,1rem);letter-spacing:.08em;caret-color:var(--g);
}
#sinput::placeholder{color:rgba(0,255,65,.22)}
.shint{font-size:.62rem;color:rgba(0,255,65,.25);letter-spacing:.16em;text-align:center;margin-top:.45em}
#search-tags{font-size:.6rem;color:rgba(0,255,65,.18);letter-spacing:.14em;text-align:center;margin-top:.3em}

/* ═══ RESULT PAGE ═══ */
#result-page{
  position:fixed;inset:0;z-index:320;
  display:flex;flex-direction:column;align-items:center;
  padding:5rem 1rem 6rem;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  opacity:0;pointer-events:none;transition:opacity .35s;
}
#result-page.show{opacity:1;pointer-events:all}

.rcard{width:min(560px,98vw);border:1px solid rgba(0,255,65,.28);background:rgba(0,255,65,.03);padding:1.4rem 1.2rem;box-shadow:0 0 28px rgba(0,255,65,.06)}
.rcard h2{font-family:var(--vt);font-size:1.8rem;letter-spacing:.18em;color:var(--g);margin-bottom:1rem;border-bottom:1px solid rgba(0,255,65,.14);padding-bottom:.45rem}

.rrow{display:flex;gap:.6rem;padding:.42rem 0;border-bottom:1px solid rgba(0,255,65,.06);font-size:clamp(.78rem,3.5vw,.9rem);letter-spacing:.06em;align-items:baseline}
.rrow .lb{color:rgba(0,255,65,.4);min-width:130px;flex-shrink:0;font-size:.8em}
.rrow .vl{color:var(--g)}

.rlink{display:flex;gap:.6rem;padding:.48rem 0;border-bottom:1px solid rgba(0,255,65,.06);align-items:center;flex-wrap:wrap}
.rlink .lb{color:rgba(0,255,65,.4);font-size:.78rem;min-width:90px;flex-shrink:0}
.rlink a{color:var(--g);text-decoration:none;font-size:clamp(.78rem,3.5vw,.88rem);border-bottom:1px solid rgba(0,255,65,.2);transition:color .15s;word-break:break-all}
.rlink a:hover,.rlink a:active{color:#fff;border-color:var(--g)}
.badge{font-size:.55rem;letter-spacing:.1em;color:var(--bg);background:var(--gdim);padding:.12em .35em;margin-left:.3em;vertical-align:middle;white-space:nowrap}

.hblock{margin-top:.4rem;line-height:2;font-size:clamp(.78rem,3.5vw,.88rem);letter-spacing:.06em;color:rgba(0,255,65,.82)}
.hblock .tag{color:var(--g);margin-bottom:.1em}
.hblock .sec{color:rgba(0,255,65,.38);font-size:.68rem;letter-spacing:.18em;margin:1rem 0 .4rem}

#back-btn{
  margin-top:1.2rem;background:transparent;
  border:1px solid rgba(0,255,65,.28);color:rgba(0,255,65,.55);
  font-family:var(--mono);font-size:.72rem;letter-spacing:.18em;padding:.5em 1.4em;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:border-color .2s,color .2s;
}
#back-btn:active{border-color:var(--g);color:var(--g)}

/* ═══ POPUPS ═══ */
.pop-ov{position:fixed;inset:0;z-index:800;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.78);opacity:0;pointer-events:none;transition:opacity .3s}
.pop-ov.show{opacity:1;pointer-events:all}
.pop-box{width:min(400px,90vw);border:1px solid rgba(0,255,65,.38);background:#030f05;padding:1.8rem 1.6rem 1.4rem;box-shadow:0 0 36px rgba(0,255,65,.1)}
.pop-box h3{font-family:var(--vt);font-size:1.55rem;letter-spacing:.13em;color:var(--g);margin-bottom:.8rem;line-height:1.3}
.pop-box p{font-size:clamp(.72rem,3vw,.8rem);color:rgba(0,255,65,.5);letter-spacing:.09em;margin-bottom:1.3rem;line-height:1.85}
.pbtns{display:flex;gap:.9rem}
.pbtn{flex:1;font-family:var(--mono);font-size:clamp(.75rem,3.5vw,.85rem);letter-spacing:.18em;padding:.65em;border:1px solid rgba(0,255,65,.35);background:transparent;color:var(--g);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s,color .15s}
.pbtn:active,.pbtn:hover{background:var(--g);color:var(--bg)}

/* ═══ MUSIC PLAYER ═══ */
#player{
  position:fixed;bottom:-150px;left:0;right:0;z-index:600;
  background:#020e04;border-top:1px solid rgba(0,255,65,.22);
  padding:.65rem 1rem .55rem;
  transition:bottom .5s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;gap:.45rem;
}
#player.open{bottom:0}
.ptop{display:flex;align-items:center;gap:.9rem}
#p-cover{width:44px;height:44px;object-fit:cover;border:1px solid rgba(0,255,65,.2);flex-shrink:0}
.pinfo{flex:1;min-width:0}
#p-title{font-family:var(--vt);font-size:1.05rem;letter-spacing:.1em;color:var(--g);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#p-sub{font-size:.58rem;letter-spacing:.15em;color:rgba(0,255,65,.3);margin-top:.1rem}
.pctls{display:flex;align-items:center;gap:.7rem;flex-shrink:0}
.pctl{background:transparent;border:none;color:rgba(0,255,65,.65);font-size:1.1rem;cursor:pointer;padding:.2em;-webkit-tap-highlight-color:transparent;transition:color .15s}
.pctl:active{color:var(--g)}
#p-play{width:34px;height:34px;border:1px solid rgba(0,255,65,.45);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;background:transparent;color:var(--g);cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0}
#p-play:active{background:rgba(0,255,65,.12)}
.pprog{display:flex;align-items:center;gap:.6rem;font-size:.58rem;color:rgba(0,255,65,.3);letter-spacing:.06em}
#p-seek{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:rgba(0,255,65,.14);outline:none;cursor:pointer}
#p-seek::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--g);border-radius:50%;box-shadow:0 0 5px var(--g)}

/* ═══ BOOT LOG ═══ */
#blog{position:fixed;bottom:1rem;left:1rem;font-size:.58rem;color:rgba(0,255,65,.25);letter-spacing:.05em;line-height:1.9;z-index:400;pointer-events:none;max-width:55vw}

/* ═══ DUCK ═══ */
#duck{position:fixed;bottom:-60px;font-size:2rem;z-index:450;pointer-events:none;filter:drop-shadow(0 0 6px rgba(0,255,65,.5));white-space:nowrap}
#duck.fly{animation:duckfly 7s linear forwards}
@keyframes duckfly{0%{left:-80px;bottom:20vh}45%{bottom:45vh}55%{bottom:45vh}100%{left:calc(100vw + 80px);bottom:20vh}}

/* ═══ MEME ═══ */
.meme{position:fixed;z-index:450;pointer-events:none;font-family:var(--vt);font-size:1.4rem;color:var(--g);letter-spacing:.1em;text-shadow:0 0 10px var(--g);opacity:0;animation:memepop 3.8s forwards;border:1px solid rgba(0,255,65,.22);padding:.3em .7em;background:rgba(0,0,0,.72)}
@keyframes memepop{0%{opacity:0;transform:translateY(10px)}12%{opacity:1;transform:none}80%{opacity:1}100%{opacity:0;transform:translateY(-8px)}}

/* ═══ GLITCH ═══ */
@keyframes glitch{0%,100%{clip-path:none;transform:none}20%{clip-path:inset(30% 0 40% 0);transform:translate(-3px,1px)}21%{clip-path:none;transform:none}55%{clip-path:inset(60% 0 20% 0);transform:translate(3px,-1px)}56%{clip-path:none;transform:none}}
.glitch{animation:glitch .2s}

@keyframes flk{0%,100%{opacity:1}93%{opacity:.6}94%{opacity:1}97%{opacity:.7}98%{opacity:1}}
body{animation:flk 10s infinite}
</style>
</head>
<body>

<div id="cursor"></div>
<div class="c tl"></div><div class="c tr"></div><div class="c bl"></div><div class="c br"></div>
<canvas id="matrix"></canvas>
<div id="scanlines"></div>
<div id="sweep"></div>
<div id="vignette"></div>
<div id="fl"></div>

<!-- ENTER -->
<div id="enter-screen">
  <div id="enter-logo">NexsyzBio</div>
  <div id="enter-sub">// BIOS TERMINAL v1.6.7 //</div>
  <button id="btn-enter">[ ВОЙТИ ]</button>
</div>

<!-- HERO -->
<div id="stage">
  <div id="hero">
    <div id="hl">Hello, you're in</div>
    <div id="tl">NexsyzBio</div>
    <div id="sl">0.1.1</div>
  </div>
</div>

<!-- SEARCH -->
<div id="sw">
  <div id="sbox">
    <span class="si">⌕</span>
    <input id="sinput" type="search" enterkeyhint="search" placeholder="search nexsyz..." autocomplete="off" spellcheck="false"/>
  </div>
  <div class="shint">[ TAP ENTER TO EXECUTE ]</div>
  <div id="search-tags">Попробуйте: BIO · Links · HOBBY</div>
</div>

<!-- RESULT -->
<div id="result-page">
  <div class="rcard" id="rcard"></div>
  <button id="back-btn" onclick="closeResult()">← НАЗАД</button>
</div>

<!-- POPUP EGGS -->
<div class="pop-ov" id="pop-eggs">
  <div class="pop-box">
    <h3>// EASTER EGGS //</h3>
    <p>Хотите включить пасхалки?<br>Утки, мемные фразы и другие сюрпризы.</p>
    <div class="pbtns">
      <button class="pbtn" onclick="answerEggs(true)">ДА</button>
      <button class="pbtn" onclick="answerEggs(false)">НЕТ</button>
    </div>
  </div>
</div>

<!-- POPUP MUSIC -->
<div class="pop-ov" id="pop-music">
  <div class="pop-box">
    <h3>// МУЗЫКА //</h3>
    <p>Хотите слушать музыку?</p>
    <div class="pbtns">
      <button class="pbtn" onclick="answerMusic(true)">ДА</button>
      <button class="pbtn" onclick="answerMusic(false)">НЕТ</button>
    </div>
  </div>
</div>

<!-- BOOT LOG -->
<div id="blog"></div>
<div id="duck"></div>

<!-- PLAYER -->
<div id="player">
  <div class="ptop">
    <img id="p-cover" src="" alt=""/>
    <div class="pinfo">
      <div id="p-title">—</div>
      <div id="p-sub">TekCTO · NexsyzBio</div>
    </div>
    <div class="pctls">
      <button class="pctl" onclick="prevTrack()">⏮</button>
      <button id="p-play" onclick="togglePlay()">▶</button>
      <button class="pctl" onclick="nextTrack()">⏭</button>
    </div>
  </div>
  <div class="pprog">
    <span id="p-cur">0:00</span>
    <input type="range" id="p-seek" value="0" min="0" max="100" step="0.1"/>
    <span id="p-dur">0:00</span>
  </div>
</div>
<audio id="audio"></audio>

<script>
// ── CURSOR (PC only) ──
const cur=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px'});
document.addEventListener('mousedown',()=>cur.classList.add('click'));
document.addEventListener('mouseup',()=>cur.classList.remove('click'));

// ── MATRIX ──
const cv=document.getElementById('matrix'),ctx=cv.getContext('2d');
let cols,drops;
function initM(){cv.width=innerWidth;cv.height=innerHeight;const s=14;cols=Math.floor(cv.width/s);drops=Array.from({length:cols},()=>Math.random()*-50)}
initM();window.addEventListener('resize',initM);
setInterval(()=>{
  ctx.fillStyle='rgba(2,12,4,.055)';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.font='14px "Share Tech Mono","Courier New",monospace';
  for(let i=0;i<cols;i++){
    ctx.fillStyle=Math.random()>.94?'#00ff41':'#003b0e';
    ctx.fillText(Math.random()>.5?'1':'0',i*14,drops[i]*14);
    if(drops[i]*14>cv.height&&Math.random()>.975)drops[i]=0;
    drops[i]++;
  }
},48);

// ── AUDIO UTIL ──
let aC=null;
function getAC(){if(!aC)aC=new(window.AudioContext||window.webkitAudioContext)();return aC}
function playBeep(f=440,d=.08){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.frequency.value=f;o.type='square';g.gain.setValueAtTime(.1,ac.currentTime);g.gain.linearRampToValueAtTime(0,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}catch(e){}}
function playStatic(dur=5){try{const ac=getAC(),buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.28;const src=ac.createBufferSource();src.buffer=buf;const g=ac.createGain();g.gain.setValueAtTime(.7,ac.currentTime);g.gain.linearRampToValueAtTime(0,ac.currentTime+dur);const bp=ac.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1100;bp.Q.value=.5;src.connect(bp);bp.connect(g);g.connect(ac.destination);src.start();src.stop(ac.currentTime+dur)}catch(e){}}

const notif=new Audio('fears-to-fathom-notification-sound.mp3');notif.volume=.45;
function playNotif(){try{notif.currentTime=0;notif.play()}catch(e){}}

// ── FLASHLIGHT ──
function animFL(done){
  const fl=document.getElementById('fl');fl.style.opacity=1;
  let t0=null;const DUR=5000;
  function tick(ts){
    if(!t0)t0=ts;const e=ts-t0,p=e/DUR;let r;
    if(p<.12)r=p/.12*220;
    else if(p<.55){r=220+Math.sin(p*45)*25;if(Math.random()>.82)r+=(Math.random()-.5)*80}
    else if(p<.78)r=220-(p-.55)/.23*195;
    else r=28+(Math.random()>.55?Math.random()*18:0);
    fl.style.background=`radial-gradient(circle ${r}px at 50% 50%,rgba(0,255,65,.2) 0%,rgba(0,80,20,.1) 45%,rgba(0,0,0,.97) 100%)`;
    if(e<DUR)requestAnimationFrame(tick);
    else{fl.style.opacity=0;setTimeout(done,350)}
  }
  requestAnimationFrame(tick);
}

// ── GLITCH ──
function glitch(el){el.classList.remove('glitch');void el.offsetWidth;el.classList.add('glitch');el.addEventListener('animationend',()=>el.classList.remove('glitch'),{once:true})}

// ── BOOT LOG ──
const LOG=['BIOS v1.6.7 ......... OK','KERNEL LOADED ...... OK','MOUNTING /nexsyz ... OK','SECURE LINK ........ OK','ID: 0.1.1 ......... OK','WELCOME! '];
function typeLog(i=0){if(i>=LOG.length)return;const el=document.getElementById('blog'),d=document.createElement('div');d.textContent='> '+LOG[i];el.appendChild(d);playBeep(380+i*35,.055);setTimeout(()=>typeLog(i+1),400)}

// ── ENTER BUTTON ──
let started=false;
document.getElementById('btn-enter').addEventListener('click',()=>{
  if(started)return;started=true;
  playStatic(6);
  document.getElementById('matrix').classList.add('on');
  document.getElementById('enter-screen').classList.add('out');
  setTimeout(()=>{const es=document.getElementById('enter-screen');if(es)es.remove()},700);
  setTimeout(typeLog,350);
  animFL(()=>showPopup('pop-eggs'));
});

// ── POPUPS ──
function showPopup(id){document.getElementById(id).classList.add('show')}
function hidePopup(id){document.getElementById(id).classList.remove('show')}

let eggsOn=true,musicOn=false;
window.answerEggs=function(yes){eggsOn=yes;hidePopup('pop-eggs');setTimeout(()=>showPopup('pop-music'),350)};
window.answerMusic=function(yes){
  musicOn=yes;hidePopup('pop-music');
  setTimeout(()=>{
    showHero();
    if(yes)openPlayer();
    if(eggsOn)scheduleEggs();
  },250);
};

// ── HERO ──
function showHero(){const h=document.getElementById('hero');h.classList.add('show');setTimeout(enterSearch,4000)}

// ── SEARCH MODE ──
let sMode=false;
function enterSearch(){

// ── TRACKS ──
const TRACKS=[
  {title:'Prayer In C',                  file:'2_5471952948315583208.m4a',               cover:'Lilly_Wood_and_the_Prick_and_Robin_Schulz_-_Prayer_in_C.png'},
  {title:'Рваные Джинсы — Jeff Killer',  file:'2_5283263838022573725 (1).m4a',           cover:'artworks-000261006380-qi1ztr-t1080x1080.jpg'},
  {title:'Гладиатор / Рыцарь',           file:'Fallen777angel - Гладиатор (рыцарь) (1).mp3', cover:'7c5bac9ae02194b81f86415736bfcad5.1000x1000x1.png'}
];
let tIdx=0;
const aud=document.getElementById('audio');

function openPlayer(){loadTrack(0);document.getElementById('player').classList.add('open')}
function loadTrack(i){
  tIdx=i;const t=TRACKS[i];
  aud.src=t.file;
  document.getElementById('p-title').textContent=t.title;
  document.getElementById('p-cover').src=t.cover;
  document.getElementById('p-play').textContent='▶';
  aud.load();aud.play().then(()=>document.getElementById('p-play').textContent='⏸').catch(()=>{});
}
window.togglePlay=function(){if(aud.paused){aud.play();document.getElementById('p-play').textContent='⏸'}else{aud.pause();document.getElementById('p-play').textContent='▶'}};
window.nextTrack=function(){loadTrack((tIdx+1)%TRACKS.length)};
window.prevTrack=function(){loadTrack((tIdx-1+TRACKS.length)%TRACKS.length)};
aud.addEventListener('ended',()=>window.nextTrack());
aud.addEventListener('timeupdate',()=>{
  if(!aud.duration)return;
  const p=(aud.currentTime/aud.duration)*100;
  document.getElementById('p-seek').value=p;
  document.getElementById('p-cur').textContent=fmt(aud.currentTime);
  document.getElementById('p-dur').textContent=fmt(aud.duration);
});
document.getElementById('p-seek').addEventListener('input',function(){if(aud.duration)aud.currentTime=(this.value/100)*aud.duration});
function fmt(s){const m=Math.floor(s/60),sc=Math.floor(s%60);return m+':'+(sc<10?'0':'')+sc}

// ── EASTER EGGS ──
const MEMES=['* двигайся за ящиком *','* вотч демо *','* sudo make sandwich *','* следи за курсором *','* ты в матрице *','* не нажимай F12 *','* я вижу тебя *','* git push --force *','* reboot required *','* trust no one *'];
let duckOut=false,memeOut=false;

function spawnDuck(){
  if(!eggsOn||duckOut)return;duckOut=true;
  playNotif();
  const d=document.getElementById('duck');d.textContent='🦆  quack.exe';d.classList.add('fly');
  d.addEventListener('animationend',()=>{d.classList.remove('fly');duckOut=false},{once:true});
}
function spawnMeme(){
  if(!eggsOn||memeOut)return;memeOut=true;
  playNotif();
  const el=document.createElement('div');el.className='meme';
  el.textContent=MEMES[Math.floor(Math.random()*MEMES.length)];
  const side=Math.random()>.5;
  el.style.top=(14+Math.random()*55)+'vh';
  el.style[side?'left':'right']=(3+Math.random()*10)+'vw';
  document.body.appendChild(el);
  el.addEventListener('animationend',()=>{el.remove();memeOut=false});
}
function scheduleEggs(){
  (function dt(){setTimeout(()=>{spawnDuck();dt()},26000+Math.random()*28000)})();
  setTimeout(()=>(function mt(){setTimeout(()=>{spawnMeme();mt()},13000+Math.random()*15000)})(),9000);
}
const KON=[38,38,40,40,37,39,37,39,66,65];let ki=0;
document.addEventListener('keydown',e=>{if(e.keyCode===KON[ki])ki++;else ki=0;if(ki===KON.length){ki=0;spawnMeme();spawnDuck()}});
